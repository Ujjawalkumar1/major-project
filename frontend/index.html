<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SRS Generator</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-glob"></div>
    <div class="container">
        <!-- Auth Section -->
        <div id="auth-section" class="section glass-panel">
            <h1 class="logo-title">🚀 AI SRS Generator</h1>

            <!-- Login Form -->
            <div id="login-form">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <input type="email" id="login-email" placeholder="Email" value="test@example.com">
                    <input type="password" id="login-password" placeholder="Password" value="password123">
                    <button onclick="login()" class="primary-btn glow-effect" id="login-btn">Login</button>
                    <p class="switch-text">New here? <a href="#" onclick="toggleAuth('signup')">Create an account</a>
                    </p>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signup-form" class="hidden">
                <h2>Create Account</h2>
                <div class="form-group">
                    <input type="text" id="signup-name" placeholder="Full Name">
                    <input type="email" id="signup-email" placeholder="Email">
                    <input type="password" id="signup-password" placeholder="Password">
                    <button onclick="signup()" class="secondary-btn glow-effect" id="signup-btn">Sign Up</button>
                    <p class="switch-text">Already have an account? <a href="#" onclick="toggleAuth('login')">Login</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="section glass-panel hidden">
            <header>
                <h2>📝 SRS Dashboard</h2>
                <div class="user-info">
                    <span id="user-display-name">User</span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </header>

            <div class="main-actions">
                <!-- Input Method Selection -->
                <div class="input-method-tabs">
                    <button class="tab-btn active" onclick="switchMethod('audio')">🎙️ Upload Audio</button>
                    <button class="tab-btn" onclick="switchMethod('text')">✍️ Direct Text</button>
                </div>

                <!-- Audio Input -->
                <div id="audio-input-area" class="input-area">
                    <label>Upload Audio File (.wav, .mp3)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" id="audio-file" accept="audio/*">
                    </div>
                    <button onclick="transcribeAudio()" class="action-btn" id="transcribe-btn">Transcribe Audio</button>
                    <div id="transcribe-loading" class="loading-spinner hidden"></div>

                    <div id="transcription-result" class="result-box hidden">
                        <h4>Transcription:</h4>
                        <p id="transcription-text"></p>
                        <input type="hidden" id="transcription-id">
                    </div>
                </div>

                <!-- Text Input -->
                <div id="text-input-area" class="input-area hidden">
                    <label>Enter Requirement</label>
                    <textarea id="direct-text" rows="4"
                        placeholder="Build a food delivery app with login, payment gateway, and rider tracking..."></textarea>
                </div>

                <!-- Template Selection & Generation -->
                <div class="generation-area">
                    <div class="select-wrapper">
                        <label>Select Template</label>
                        <select id="template-select" class="styled-select">
                            <option value="agile">Agile (User Stories)</option>
                            <option value="ieee">IEEE 830 (Formal)</option>
                            <option value="minimal">Minimal (Brief)</option>
                            <option value="startup">Startup (Pitch Focus)</option>
                        </select>
                    </div>

                    <button onclick="generateSRS()" class="primary-btn generate-btn" id="generate-btn">✨ Generate
                        SRS</button>
                    <div id="generate-loading" class="loading-text hidden">Generating... <span
                            class="loader-dots"></span></div>
                </div>
            </div>

            <!-- SRS List -->
            <div class="srs-list-container">
                <h3>📂 My Documents</h3>
                <div class="table-responsive">
                    <table class="srs-table">
                        <thead>
                            <tr>
                                <th>Requirement / Text</th>
                                <th>Template</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="srs-list-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                    <div id="list-loading" class="loading-spinner hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden"></div>

    <script src="app.js"></script>
</body>

</html>
